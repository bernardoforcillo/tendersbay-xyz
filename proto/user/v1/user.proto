syntax = "proto3";
package user.v1;

option go_package = "github.com/bernardoforcillo/tendersbay-xyz/services/backend/gen/user/v1;userv1";

import "auth/v1/auth.proto";

service UserService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc ChangeEmail(ChangeEmailRequest) returns (ChangeEmailResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}

message GetProfileRequest {}
message GetProfileResponse { auth.v1.UserInfo user = 1; }

message UpdateProfileRequest { string display_name = 1; }
message UpdateProfileResponse { auth.v1.UserInfo user = 1; }

message ChangeEmailRequest {
  string new_email = 1;
  string password = 2;
  string locale = 3;
}
message ChangeEmailResponse {}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}
message ChangePasswordResponse {}

message DeleteAccountRequest { string password = 1; }
message DeleteAccountResponse {}
