# 1. ImageRepository
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: tendersbay-platform-image-repository
  namespace: tendersbay-xyz
spec:
  image: bernardoforcillo/tendersbay-platform
  interval: 1m

---
# 2. ImagePolicy
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tendersbay-platform-image-policy
  namespace: tendersbay-xyz
spec:
  imageRepositoryRef:
    name: tendersbay-platform-image-repository
  filterTags:
    # Stable tags published from main are <YYYYMMDDHHMMSS>-<full-sha>.
    # The 40-char SHA match excludes :latest and the -canary (dev) images.
    pattern: "^(?P<timestamp>[0-9]{14})-[0-9a-fA-F]{40}$"
    extract: "$timestamp"
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m

---
# 3. ImageUpdateAutomation
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: image-automation-tendersbay-platform
  namespace: tendersbay-xyz
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: tendersbay-xyz-repository
    namespace: flux-system
  git:
    commit:
      author:
        name: Bernardo Forcillo
        email: bernardoforcillo@gmail.com
      messageTemplate: "chore: update image platform"
    push:
      branch: main
  update:
    # Scan the whole platform app folder so both channels (main + canary) get
    # their $imagepolicy markers rewritten by this single automation.
    path: "./infrastructure/kubernetes/tendersbay-xyz/platform"
    strategy: Setters
