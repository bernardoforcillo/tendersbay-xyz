apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-canary
  namespace: tendersbay-xyz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tendersbay-xyz
      tier: platform-canary
  template:
    metadata:
      labels:
        app: tendersbay-xyz
        tier: platform-canary
    spec:
      securityContext:
        # gcr.io/distroless/static-debian12:nonroot -> UID/GID 65532.
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform
          # Canary channel: tracks the newest <timestamp>-<sha>-canary image
          # built from the dev branch (see canary/update.yaml). The $imagepolicy
          # marker is rewritten by Flux image automation; until the first
          # reconcile the :latest placeholder is the stable image.
          image: bernardoforcillo/tendersbay-platform:20260716192924-91e353be6f97dc283c1c0b01463196ed124df221-canary@sha256:8d5b34c92595c60ab7522821ebdda5af349b4dbfaae804df9633ee4c70fd722c # {"$imagepolicy": "tendersbay-xyz:tendersbay-platform-canary-image-policy"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: '128Mi'
              cpu: '50m'
            requests:
              memory: '64Mi'
              cpu: '10m'
          env:
            - name: PORT
              value: '8080'
            # ConnectRPC backend the browser calls; injected into window.__ENV__.
            - name: API_URL
              value: 'https://api.dev.tendersbay.xyz'
            # PostHog project key is a public client key (phc_…); plaintext is fine.
            - name: POSTHOG_API_KEY
              value: 'phc_wDJgrzT5ar2CaE8LKuTVk35njTgJB4w2cTQyDQNzcD4C'
            - name: POSTHOG_HOST
              value: 'https://eu.i.posthog.com'
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
