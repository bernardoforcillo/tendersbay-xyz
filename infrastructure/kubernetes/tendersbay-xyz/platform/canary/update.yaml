# Canary ImagePolicy.
#
# It reuses the stable ImageRepository (tendersbay-platform-image-repository) and
# the existing ImageUpdateAutomation (image-automation-tendersbay-platform): that
# automation already scans this folder and rewrites every $imagepolicy marker it
# can resolve in this namespace, so the canary Deployment marker is picked up
# without a second automation.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tendersbay-platform-canary-image-policy
  namespace: tendersbay-xyz
spec:
  imageRepositoryRef:
    name: tendersbay-platform-image-repository
  filterTags:
    # Canary tags published from dev are <YYYYMMDDHHMMSS>-<full-sha>-canary.
    pattern: "^(?P<timestamp>[0-9]{14})-[0-9a-fA-F]{40}-canary$"
    extract: "$timestamp"
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m
