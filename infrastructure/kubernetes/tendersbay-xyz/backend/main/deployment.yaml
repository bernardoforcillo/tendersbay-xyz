apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tendersbay-xyz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tendersbay-xyz
      tier: backend
  template:
    metadata:
      labels:
        app: tendersbay-xyz
        tier: backend
    spec:
      securityContext:
        # gcr.io/distroless/static-debian12:nonroot is UID/GID 65532.
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          # Image published by .github/workflows/ci-backend.yml; tag rewritten by
          # Flux image automation (see update.yaml).
          image: bernardoforcillo/tendersbay-backend:20260715044122-8cb3f6d1245d463da4c010d1da97d6b141c2b0b9@sha256:1d5701f16ed8569f268bb605b9b90bfcfe778709d3c3cc25f672c3972550f927 # {"$imagepolicy": "tendersbay-xyz:tendersbay-backend-image-policy"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: '128Mi'
              cpu: '50m'
            requests:
              memory: '64Mi'
              cpu: '10m'
          envFrom:
            - secretRef:
                name: backend-secrets
          env:
            - name: PORT
              value: '8080'
            - name: SERVICE_NAME
              value: 'tendersbay-backend'
            # PostHog project key is a public client key (phc_…); plaintext is fine.
            - name: POSTHOG_API_KEY
              value: 'phc_wDJgrzT5ar2CaE8LKuTVk35njTgJB4w2cTQyDQNzcD4C'
            - name: POSTHOG_HOST
              value: 'https://eu.i.posthog.com'
            # Non-secret app config — kept in plaintext here, out of the Secret.
            - name: APP_BASE_URL
              value: 'https://tendersbay.xyz'
            - name: JWT_EXPIRY
              value: '15m'
            - name: REFRESH_EXPIRY
              value: '168h'
            - name: QDRANT_URL
              value: 'http://qdrant-release.qdrant.svc.cluster.local:6333'
            - name: OLLAMA_BASE_URL
              value: 'http://ollama-release.ollama.svc.cluster.local:11434'
            - name: EMBEDDING_MODEL
              value: 'embeddinggemma:latest'
            - name: REDIS_URL
              value: 'redis://redis-release-master.redis.svc.cluster.local:6379'
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
