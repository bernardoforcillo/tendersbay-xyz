# Canary ImagePolicy. Reuses the stable ImageRepository
# (tendersbay-backend-image-repository) and the existing
# ImageUpdateAutomation (image-automation-tendersbay-backend), which already
# scans the backend folder and rewrites every $imagepolicy marker it resolves.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tendersbay-backend-canary-image-policy
  namespace: tendersbay-xyz
spec:
  imageRepositoryRef:
    name: tendersbay-backend-image-repository
  filterTags:
    # Canary tags published from dev are <YYYYMMDDHHMMSS>-<full-sha>-canary.
    pattern: "^(?P<timestamp>[0-9]{14})-[0-9a-fA-F]{40}-canary$"
    extract: "$timestamp"
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m
