apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  namespace: tendersbay-xyz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tendersbay-xyz
      tier: backend-canary
  template:
    metadata:
      labels:
        app: tendersbay-xyz
        tier: backend-canary
    spec:
      securityContext:
        # gcr.io/distroless/static-debian12:nonroot is UID/GID 65532.
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: bernardoforcillo/tendersbay-backend:20260705165456-ce15b1a2671ab4fb27819c038a7516a5e63eb3d2-canary@sha256:cd822a5ae8aaa7cbba85032095003554cc52c5bdf5d9ea96148d5ab593a21b20 # {"$imagepolicy": "tendersbay-xyz:tendersbay-backend-canary-image-policy"}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: '128Mi'
              cpu: '50m'
            requests:
              memory: '64Mi'
              cpu: '10m'
          envFrom:
            - secretRef:
                name: backend-canary-secrets
          env:
            - name: PORT
              value: '8080'
            - name: SERVICE_NAME
              value: 'tendersbay-backend'
            # PostHog project key is a public client key (phc_…); plaintext is fine.
            - name: POSTHOG_API_KEY
              value: 'phc_wDJgrzT5ar2CaE8LKuTVk35njTgJB4w2cTQyDQNzcD4C'
            - name: POSTHOG_HOST
              value: 'https://eu.i.posthog.com'
            # Non-secret app config — kept in plaintext here, out of the Secret.
            - name: APP_BASE_URL
              value: 'https://dev.tendersbay.xyz'
            - name: JWT_EXPIRY
              value: '15m'
            - name: REFRESH_EXPIRY
              value: '168h'
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
