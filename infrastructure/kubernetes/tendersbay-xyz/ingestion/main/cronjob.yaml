apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingestion
  namespace: tendersbay-xyz
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # 3000s = 50m, leaving headroom before the next hourly fire. Fixed
      # here (not an app env var) — see the design doc for why
      # INGESTION_TIMEOUT was dropped in favor of Kubernetes owning the cap.
      activeDeadlineSeconds: 3000
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: tendersbay-xyz
            tier: ingestion
        spec:
          restartPolicy: OnFailure
          securityContext:
            # gcr.io/distroless/static-debian12:nonroot is UID/GID 65532.
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingestion
              # Image published by .github/workflows/ci-ingestion.yml; tag
              # rewritten by Flux image automation once the first build
              # lands (see update.yaml). :latest is a bootstrap placeholder.
              image: bernardoforcillo/tendersbay-ingestion:20260719202905-dcc50bc1486195a0ee6f266381491d11751b6758@sha256:5e1eda385aa064f917ab4c458c73ffc74ad555fbd1dda28f0647942d13c1f65b # {"$imagepolicy": "tendersbay-xyz:tendersbay-ingestion-image-policy"}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              # Memory bumped for PDF download+extraction (tabula parses whole
              # notice PDFs in memory, tens of MB for large bundles). A
              # conservative estimate, not a measured value — revisit once
              # load-tested against production-size PDF notices.
              resources:
                limits:
                  memory: '256Mi'
                  cpu: '200m'
                requests:
                  memory: '128Mi'
                  cpu: '50m'
              envFrom:
                - secretRef:
                    name: ingestion-secrets
              env:
                - name: SERVICE_NAME
                  value: 'tendersbay-ingestion'
                # PostHog project key is a public client key (phc_…); plaintext is fine.
                - name: POSTHOG_API_KEY
                  value: 'phc_wDJgrzT5ar2CaE8LKuTVk35njTgJB4w2cTQyDQNzcD4C'
                - name: POSTHOG_HOST
                  value: 'https://eu.i.posthog.com'
                - name: QDRANT_URL
                  value: 'http://qdrant-release.qdrant.svc.cluster.local:6333'
                - name: OLLAMA_BASE_URL
                  value: 'http://ollama-release.ollama.svc.cluster.local:11434'
                - name: EMBEDDING_MODEL
                  value: 'embeddinggemma:latest'
              imagePullPolicy: Always
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
