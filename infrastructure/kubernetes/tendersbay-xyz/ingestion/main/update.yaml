# 1. ImageRepository
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: tendersbay-ingestion-image-repository
  namespace: tendersbay-xyz
spec:
  image: bernardoforcillo/tendersbay-ingestion
  interval: 1m

---
# 2. ImagePolicy (stable)
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tendersbay-ingestion-image-policy
  namespace: tendersbay-xyz
spec:
  imageRepositoryRef:
    name: tendersbay-ingestion-image-repository
  filterTags:
    # Stable tags published from main are <YYYYMMDDHHMMSS>-<full-sha>.
    pattern: "^(?P<timestamp>[0-9]{14})-[0-9a-fA-F]{40}$"
    extract: "$timestamp"
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m

---
# 3. ImageUpdateAutomation (ingestion-scoped; commits to main)
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: image-automation-tendersbay-ingestion
  namespace: tendersbay-xyz
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: tendersbay-xyz-repository
    namespace: flux-system
  git:
    commit:
      author:
        name: Bernardo Forcillo
        email: bernardoforcillo@gmail.com
      messageTemplate: "chore: update image ingestion"
    push:
      branch: main
  update:
    path: "./infrastructure/kubernetes/tendersbay-xyz/ingestion"
    strategy: Setters
