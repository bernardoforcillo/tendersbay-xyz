name: ci-platform

on:
  pull_request:
  push:
    branches: [main, dev]
    paths:
      - 'apps/platform/**'
      - 'packages/**'
    paths-ignore:
      - 'infrastructure/**'
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Lint (gofmt + go vet)
        run: pnpm exec turbo run lint

      - name: Type-check
        run: pnpm check

      - name: Test
        run: pnpm test

  docker:
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/tendersbay-platform"
          STAMP="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${REPO}:${STAMP},${REPO}:latest"
          else
            TAGS="${REPO}:${STAMP}-canary"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/platform/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
